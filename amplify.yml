version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 24.18.0
        - nvm use 24.18.0
        - npm ci
    build:
      commands:
        - rm -f .env.production
        - env | grep -E '^(APP_ENV|BETTER_AUTH_URL|BETTER_AUTH_SECRET|DATABASE_DRIVER|DB_CLUSTER_ARN|DB_SECRET_ARN|DB_NAME|SES_FROM_EMAIL|BOOTSTRAP_ADMIN_EMAILS|PUBLIC_PROTOTYPE_READONLY|ZCG_KNOWLEDGE_AI_ENABLED|ZCG_KNOWLEDGE_AI_API_KEY|ZCG_KNOWLEDGE_AI_BASE_URL|ZCG_KNOWLEDGE_AI_MODEL|ZCG_KNOWLEDGE_AI_TIMEOUT_MS|ZCG_KNOWLEDGE_SEMANTIC_ENABLED|ZCG_KNOWLEDGE_EMBEDDING_API_KEY|ZCG_KNOWLEDGE_EMBEDDING_BASE_URL|ZCG_KNOWLEDGE_EMBEDDING_MODEL|ZCG_KNOWLEDGE_EMBEDDING_DIMS|ZCG_KNOWLEDGE_EMBEDDING_TIMEOUT_MS|ZCG_KNOWLEDGE_EMBEDDING_BATCH_SIZE|VENICE_API_KEY|ZCG_GITHUB_OWNER|ZCG_GITHUB_REPO|ZCG_GITHUB_MAX_PAGES|ZCG_GOOGLE_SHEET_ID|ZCG_GOOGLE_SHEET_TABS)=' >> .env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
